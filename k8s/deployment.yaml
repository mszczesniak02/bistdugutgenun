apiVersion: apps/v1
kind: Deployment
metadata:
  name: bistdugutgenun-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bistdugutgenun-api
  template:
    metadata:
      labels:
        app: bistdugutgenun-api
    spec:
      containers:
        - name: api
          image: bistdugutgenun-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: bistdugutgenun-api
spec:
  type: NodePort
  selector:
    app: bistdugutgenun-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080